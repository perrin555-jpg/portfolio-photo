<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guillaume Perrin — Photographie</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eaeae8;
  --text: #1a1a18; --text2: #6b6b67; --text3: #b8b8b2;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.15);
  --side: 220px;
}
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }
body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

/* ── HOME THREE-COLUMN ─────────────────────────────── */
#view-home { display: flex; width: 100vw; height: 100vh; overflow: hidden; }

#left-panel {
  width: var(--side); flex-shrink: 0; height: 100vh;
  display: flex; flex-direction: column;
  padding: 3rem 2rem 2.5rem; background: var(--bg); z-index: 2;
}
.logo-name {
  font-size: 22px; font-weight: 400; letter-spacing: 0.04em;
  line-height: 1.15; color: var(--text); cursor: pointer;
  margin-bottom: 0.35rem; text-transform: uppercase;
}
.logo-tagline {
  font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 2.5rem;
}
.panel-divider { width: 24px; height: 1px; background: var(--border2); margin-bottom: 2rem; }

.album-nav { display: flex; flex-direction: column; gap: 0; flex: 1; }
.album-nav-item {
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text2); cursor: pointer; padding: 7px 0;
  border: none; background: none; font-family: inherit; text-align: left;
  border-bottom: 0.5px solid var(--border); transition: color 0.15s;
  display: flex; align-items: center; justify-content: space-between;
}
.album-nav-item:first-child { border-top: 0.5px solid var(--border); }
.album-nav-item:hover { color: var(--text); }
.nav-arrow { opacity: 0; font-size: 13px; transition: opacity 0.15s; }
.album-nav-item:hover .nav-arrow { opacity: 1; }

.panel-bottom { margin-top: auto; padding-top: 1rem; display: flex; flex-direction: column; gap: 6px; }
.panel-bio { font-size: 10px; color: var(--text3); letter-spacing: 0.04em; line-height: 1.7; }

/* ── SLIDESHOW CENTER ──────────────────────────────── */
#slideshow-center {
  flex: 1; height: 100vh; position: relative; overflow: hidden;
  background: var(--bg); display: flex; align-items: center; justify-content: center;
}
.slide {
  position: absolute; inset: 0; opacity: 0; transition: opacity 1.2s ease-in-out;
  display: flex; align-items: center; justify-content: center;
}
.slide.active { opacity: 1; }
.slide img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
.slide-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1rem; color: var(--text3); width: 100%; height: 100%;
}
.slide-placeholder i { font-size: 36px; }
.slide-placeholder p { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; max-width: 200px; }
.slide-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: rgba(0,0,0,0.18);
  font-size: 20px; cursor: pointer; padding: 0.75rem; z-index: 5; transition: color 0.2s;
}
.slide-arrow:hover { color: rgba(0,0,0,0.65); }
.slide-arrow.prev { left: 0.5rem; }
.slide-arrow.next { right: 0.5rem; }
.slide-dots {
  position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 5;
}
.slide-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: rgba(0,0,0,0.15); cursor: pointer; transition: background 0.3s;
}
.slide-dot.active { background: rgba(0,0,0,0.55); }
.slide-counter {
  position: absolute; bottom: 1.5rem; right: 1.5rem;
  font-size: 9px; letter-spacing: 0.12em; color: rgba(0,0,0,0.25); z-index: 5;
}

/* ── RIGHT PANEL ───────────────────────────────────── */
#right-panel {
  width: var(--side); flex-shrink: 0; height: 100vh; background: var(--bg); z-index: 2;
}

/* ── TOP BAR (inner pages) ─────────────────────────── */
body.page-mode { overflow: auto; }
#top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: 56px;
  background: var(--bg); border-bottom: 0.5px solid var(--border2);
  display: flex; align-items: center; justify-content: space-between; padding: 0 2.5rem;
}
.top-logo { font-size: 13px; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; color: var(--text); }
.top-nav { display: flex; gap: 0; align-items: center; }
.top-nav-btn {
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text2); cursor: pointer; padding: 4px 14px;
  border: none; background: none; font-family: inherit; transition: color 0.15s;
}
.top-nav-btn:hover, .top-nav-btn.active { color: var(--text); }

/* ── ALBUM VIEW ────────────────────────────────────── */
#view-album { padding-top: 56px; min-height: 100vh; }
.album-header { text-align: center; padding: 2.5rem 2rem 2rem; border-bottom: 0.5px solid var(--border); }
.album-back {
  font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text3); cursor: pointer; border: none; background: none;
  font-family: inherit; margin-bottom: 1rem; display: inline-block; transition: color 0.15s;
}
.album-back:hover { color: var(--text2); }
.album-title { font-size: 12px; font-weight: 400; letter-spacing: 0.28em; text-transform: uppercase; color: var(--text); margin-bottom: 5px; }
.album-desc { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; }

.photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2px; padding: 2px; }
.photo-cell { aspect-ratio: 1; overflow: hidden; background: var(--bg2); cursor: pointer; }
.photo-cell img {
  width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(0.9);
  transition: transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.3s;
}
.photo-cell:hover img { transform: scale(1.05); filter: brightness(1); }
.photos-empty { grid-column: 1/-1; padding: 6rem; text-align: center; color: var(--text3); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }

/* ── LIGHTBOX ──────────────────────────────────────── */
#lightbox {
  position: fixed; inset: 0; background: rgba(255,255,255,0.97);
  display: flex; align-items: center; justify-content: center; z-index: 500;
}
#lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; display: block; }
.lb-close {
  position: absolute; top: 1.5rem; right: 1.75rem; color: rgba(0,0,0,0.3);
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  cursor: pointer; border: none; background: none; font-family: inherit; transition: color 0.2s;
}
.lb-close:hover { color: var(--text); }
.lb-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: rgba(0,0,0,0.2);
  font-size: 20px; cursor: pointer; padding: 1.5rem; transition: color 0.2s;
}
.lb-nav:hover { color: var(--text); }
.lb-nav.prev { left: 0; } .lb-nav.next { right: 0; }
.lb-caption { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); color: rgba(0,0,0,0.28); font-size: 10px; letter-spacing: 0.14em; white-space: nowrap; text-transform: uppercase; }
.lb-counter { position: absolute; top: 1.5rem; left: 1.75rem; color: rgba(0,0,0,0.25); font-size: 10px; letter-spacing: 0.12em; }

/* ── MOBILE ────────────────────────────────────────── */
#burger { display: none; position: fixed; top: 1rem; right: 1rem; z-index: 300; background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }
#mobile-menu { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 250; flex-direction: column; align-items: center; justify-content: center; gap: 1.25rem; }
#mobile-menu.open { display: flex; }

@media (max-width: 760px) {
  #left-panel, #right-panel { display: none; }
  #slideshow-center { height: 60vh; }
  #burger { display: flex; align-items: center; }
  .top-nav { display: none; }
  .photos-grid { grid-template-columns: 1fr 1fr; }
  body.page-mode { overflow: auto; }
}

/* ── TOAST ─────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 1.75rem; right: 2rem; background: var(--text); color: var(--bg);
  padding: 9px 18px; border-radius: 2px; font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; z-index: 600; animation: fadeUp 0.2s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
.hidden { display: none !important; }
</style>
</head>
<body>

<button id="burger" onclick="toggleMenu()" aria-label="Menu"><i class="ti ti-menu-2"></i></button>
<div id="mobile-menu">
  <button style="position:absolute;top:1.25rem;right:1.5rem;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer" onclick="toggleMenu()"><i class="ti ti-x"></i></button>
  <div id="mobile-nav" style="display:flex;flex-direction:column;align-items:center;gap:1rem"></div>
</div>

<!-- HOME -->
<div id="view-home">
  <div id="left-panel">
    <div class="logo-name" id="logo-name" onclick="go('home')">Guillaume<br>Perrin</div>
    <div class="logo-tagline" id="logo-tagline">Photographie</div>
    <div class="panel-divider"></div>
    <nav class="album-nav" id="album-nav"></nav>
    <div class="panel-bottom">
      <div class="panel-bio" id="panel-bio"></div>
    </div>
  </div>

  <div id="slideshow-center">
    <button class="slide-arrow prev" onclick="slidePrev()"><i class="ti ti-chevron-left"></i></button>
    <button class="slide-arrow next" onclick="slideNext()"><i class="ti ti-chevron-right"></i></button>
    <div id="slide-dots" class="slide-dots"></div>
    <div id="slide-counter" class="slide-counter"></div>
  </div>

  <div id="right-panel"></div>
</div>

<!-- TOP BAR -->
<header id="top-bar" class="hidden">
  <div class="top-logo" onclick="go('home')" id="top-logo">Guillaume Perrin</div>
  <nav class="top-nav" id="top-nav"></nav>
</header>

<!-- ALBUM VIEW -->
<div id="view-album" class="hidden">
  <div class="album-header">
    <button class="album-back" onclick="go('home')">← Retour</button>
    <div class="album-title" id="album-title"></div>
    <div class="album-desc" id="album-desc"></div>
  </div>
  <div id="photos-grid" class="photos-grid"></div>
</div>

<script>
let data = { settings: { name:'Guillaume Perrin', tagline:'Photographie', bio:'' }, albums: [], diaporama: [] };
let albumPhotos = {};
let view = 'home', activeAlbum = null, lbState = null;
let slideIdx = 0, slideTimer = null;

// Load data.json then all album photo files
async function init() {
  try {
    const r = await fetch('data.json?_=' + Date.now());
    data = await r.json();
  } catch(e) {}

  // Load each album's photos from photos/albums/<id>.json if it exists
  for (const a of data.albums) {
    try {
      const r = await fetch(`photos/albums/${a.id}.json?_=` + Date.now());
      if (r.ok) albumPhotos[a.id] = await r.json();
      else albumPhotos[a.id] = [];
    } catch(e) { albumPhotos[a.id] = []; }
  }

  go('home');
}

function go(v, albumId) {
  view = v; activeAlbum = albumId || null; lbState = null; closeLb();
  const isHome = v === 'home';
  document.getElementById('view-home').classList.toggle('hidden', !isHome);
  document.getElementById('view-album').classList.toggle('hidden', v !== 'album');
  document.getElementById('top-bar').classList.toggle('hidden', isHome);
  document.getElementById('burger').style.display = isHome ? 'none' : '';
  document.body.classList.toggle('page-mode', !isHome);
  if (isHome) renderHome();
  else if (v === 'album') { renderAlbum(); renderTopBar(); }
  window.scrollTo(0, 0);
  document.getElementById('mobile-menu').classList.remove('open');
}

function toggleMenu() { document.getElementById('mobile-menu').classList.toggle('open'); }

function renderHome() {
  const s = data.settings;
  document.title = s.name + ' — ' + s.tagline;
  document.getElementById('logo-name').innerHTML = s.name.replace(' ', '<br>');
  document.getElementById('logo-tagline').textContent = s.tagline;
  document.getElementById('panel-bio').textContent = s.bio || '';

  document.getElementById('album-nav').innerHTML = data.albums.map(a =>
    `<button class="album-nav-item" onclick="go('album','${a.id}')">
       <span>${esc(a.name)}</span>
       <i class="ti ti-arrow-right nav-arrow"></i>
     </button>`
  ).join('');

  document.getElementById('mobile-nav').innerHTML = data.albums.map(a =>
    `<button style="font-size:14px;border:none;background:none;cursor:pointer;letter-spacing:0.08em;color:var(--text);font-family:inherit" onclick="go('album','${a.id}');toggleMenu()">${esc(a.name)}</button>`
  ).join('');

  buildSlideshow();
}

function renderTopBar() {
  document.getElementById('top-logo').textContent = data.settings.name;
  document.getElementById('top-nav').innerHTML = data.albums.map(a =>
    `<button class="top-nav-btn${activeAlbum===a.id?' active':''}" onclick="go('album','${a.id}')">${esc(a.name)}</button>`
  ).join('');
}

function buildSlideshow() {
  const center = document.getElementById('slideshow-center');
  center.querySelectorAll('.slide').forEach(el => el.remove());
  document.getElementById('slide-dots').innerHTML = '';
  document.getElementById('slide-counter').textContent = '';

  const photos = data.diaporama || [];
  if (!photos.length) {
    const ph = document.createElement('div');
    ph.className = 'slide active';
    ph.innerHTML = `<div class="slide-placeholder"><i class="ti ti-camera"></i><p>Ajoutez des photos au diaporama via /admin</p></div>`;
    center.appendChild(ph);
    return;
  }

  photos.forEach((p, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.innerHTML = `<img src="${p.url}" alt="${esc(p.caption||'')}" loading="${i===0?'eager':'lazy'}">`;
    center.appendChild(slide);
    const dot = document.createElement('div');
    dot.className = 'slide-dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goSlide(i);
    document.getElementById('slide-dots').appendChild(dot);
  });

  slideIdx = 0;
  updateCounter();
  clearInterval(slideTimer);
  if (photos.length > 1) slideTimer = setInterval(slideNext, 5000);
}

function updateCounter() {
  const n = (data.diaporama||[]).length;
  document.getElementById('slide-counter').textContent = n > 1 ? `${slideIdx+1} / ${n}` : '';
}

function goSlide(idx) {
  clearInterval(slideTimer);
  const slides = document.querySelectorAll('#slideshow-center .slide');
  const dots = document.querySelectorAll('.slide-dot');
  slides[slideIdx]?.classList.remove('active'); dots[slideIdx]?.classList.remove('active');
  slideIdx = (idx + slides.length) % slides.length;
  slides[slideIdx]?.classList.add('active'); dots[slideIdx]?.classList.add('active');
  updateCounter();
  if ((data.diaporama||[]).length > 1) slideTimer = setInterval(slideNext, 5000);
}
function slideNext() { goSlide(slideIdx + 1); }
function slidePrev() { goSlide(slideIdx - 1); }

function renderAlbum() {
  const a = data.albums.find(x => x.id === activeAlbum);
  if (!a) { go('home'); return; }
  document.title = a.name + ' — ' + data.settings.name;
  document.getElementById('album-title').textContent = a.name;
  document.getElementById('album-desc').textContent = a.description || '';
  const photos = albumPhotos[a.id] || [];
  const grid = document.getElementById('photos-grid');
  if (!photos.length) {
    grid.innerHTML = `<div class="photos-empty"><i class="ti ti-photo" style="font-size:28px;display:block;margin-bottom:0.75rem;opacity:0.2"></i>Aucune photo dans cet album</div>`;
  } else {
    grid.innerHTML = photos.map((p, i) =>
      `<div class="photo-cell" onclick="openLb('${a.id}',${i})" role="button" tabindex="0"><img src="${p.url}" alt="${esc(p.caption||'')}" loading="lazy"></div>`
    ).join('');
  }
}

function openLb(albumId, index) { lbState = { albumId, index }; renderLb(); }
function renderLb() {
  closeLb(); if (!lbState) return;
  const photos = albumPhotos[lbState.albumId] || [];
  const photo = photos[lbState.index]; if (!photo) return;
  const prev = lbState.index > 0 ? `<button class="lb-nav prev" onclick="lbNav(-1)"><i class="ti ti-chevron-left"></i></button>` : '';
  const next = lbState.index < photos.length-1 ? `<button class="lb-nav next" onclick="lbNav(1)"><i class="ti ti-chevron-right"></i></button>` : '';
  const lb = document.createElement('div'); lb.id = 'lightbox';
  lb.innerHTML = `<button class="lb-close" onclick="closeLb()">Fermer ×</button>
    <div class="lb-counter">${lbState.index+1} / ${photos.length}</div>
    <img src="${photo.url}" alt="${esc(photo.caption||'')}">${prev}${next}
    <div class="lb-caption">${esc(photo.caption||'')}</div>`;
  lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
  document.body.appendChild(lb);
}
function closeLb() { lbState = null; document.getElementById('lightbox')?.remove(); }
function lbNav(d) {
  if (!lbState) return;
  const photos = albumPhotos[lbState.albumId] || [];
  const ni = lbState.index + d;
  if (ni >= 0 && ni < photos.length) { lbState.index = ni; renderLb(); }
}
document.addEventListener('keydown', e => {
  if (!lbState) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let _tt;
function toast(msg) {
  document.getElementById('toast')?.remove(); clearTimeout(_tt);
  const el = document.createElement('div'); el.id='toast'; el.textContent=msg;
  document.body.appendChild(el); _tt = setTimeout(() => el.remove(), 2600);
}

init();
</script>
</body>
</html>
