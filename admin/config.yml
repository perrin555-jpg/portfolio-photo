backend:
  name: github
  repo: perrin555-jpg/portfolio-photo
  branch: main

media_folder: "photos"
public_folder: "/photos"

collections:
  - name: "settings"
    label: "Réglages du site"
    files:
      - label: "Général"
        name: "settings"
        file: "data.json"
        fields:
          - label: "Paramètres"
            name: "settings"
            widget: "object"
            fields:
              - { label: "Nom du photographe", name: "name", widget: "string" }
              - { label: "Sous-titre", name: "tagline", widget: "string" }
              - { label: "Bio courte", name: "bio", widget: "string", required: false }
          - label: "Albums"
            name: "albums"
            widget: "list"
            fields:
              - { label: "Identifiant", name: "id", widget: "string" }
              - { label: "Nom", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "string", required: false }
              - { label: "Photo de couverture", name: "cover", widget: "image", required: false }
          - label: "Diaporama (page accueil)"
            name: "diaporama"
            widget: "list"
            fields:
              - { label: "Photo", name: "url", widget: "image" }
              - { label: "Légende", name: "caption", widget: "string", required: false }
